<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manage Instructors</title>

  <link rel="stylesheet" href="manageInstructors.css">
</head>

<body>

  <div class="page-container">

    <h1>Manage Instructors</h1>

    <button class="back-btn" onclick="window.location.href='adminScheduleManagement.html'">Back to Schedule</button>
    <!-- Add Instructor -->

    <div class="section">

      <h2>Add Instructor</h2>

      <form id="addInstructorForm">

        <input
          id="instructorId"
          type="text"
          placeholder="Instructor ID (aaron)"
          required
        >

        <input
          id="name"
          type="text"
          placeholder="Instructor Name"
          required
        >

        <input
          id="email"
          type="email"
          placeholder="Email"
        >

        <select id="homeLocation">
          <option value="IN">Indianapolis (IN)</option>
          <option value="MI">Michigan (MI)</option>
        </select>

        <input
          id="maxClasses"
          type="number"
          min="0"
          value="20"
          placeholder="Max Classes"
        >

        <label class="travel-option">
          <input
            type="checkbox"
            id="canTravel"
            checked
          >
          Can Travel
        </label>

        <button type="submit">
          Add Instructor
        </button>

      </form>

    </div>

    <!-- Existing Instructors -->

    <div class="section">

      <h2>Existing Instructors</h2>

      <div id="instructorList"></div>

    </div>

  </div>

  <script
    type="module"
    src="manageInstructors.js">
  </script>

</body>

</html>
