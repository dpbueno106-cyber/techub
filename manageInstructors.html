<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Instructors</title>
</head>
<link rel="stylesheet" href="manageInstructors.css" />
<body>
  <h1>Manage Instructors</h1>
<button class="back-btn" onclick="window.location.href='adminScheduleManagement.html'">
  Back to Schedule
</button>
  <form id="addInstructorForm">
    <input id="name" placeholder="Name" required />
    <input id="email" type="email" placeholder="Email" required />
    <select id="homeLocation">
      <option value="IN">IN</option>
      <option value="MI">MI</option>
    </select>
    <label>
      <input type="checkbox" id="canTravel" />
      Can Travel
    </label>
    <button type="submit">Add Instructor</button>
  </form>

  <h2>Existing Instructors</h2>
  <ul id="instructorList"></ul>

  <script type="module" src="manageInstructors.js"></script>
</body>
</html>
