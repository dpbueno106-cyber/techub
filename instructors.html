<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instructor Management</title>
  <link rel="stylesheet" href="instructors.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Instructor Management</h1>

    <div class="header-actions">
      <button id="backBtn">Back</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <!-- PREAPPROVE -->
  <div class="section">
    <h2>Pre‑Approve Instructor</h2>

    <form id="preapproveForm" class="form-row">
      <input type="email" id="preapproveEmail" placeholder="Enter email..." required>
      <button type="submit">Add</button>
    </form>
  </div>
<div class="section">
    <h2>Pending Invites</h2>
    <ul id="pendingInvites"></ul>
  </div>
  <!-- USERS -->
  <div class="section">
    <h2>User Roles</h2>
    <div id="userList"></div>
  </div>

  <!-- INSTRUCTORS -->
  <div class="section">
    <h2>Instructor Capabilities</h2>
    <div id="instructorList"></div>
  </div>

  <!-- PENDING -->
  

</div>

<script type="module" src="instructors.js"></script>
</body>
</html>
